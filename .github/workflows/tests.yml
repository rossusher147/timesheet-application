name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  django-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: timesheet_platform/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r timesheet_platform/requirements.txt

      - name: Run Django test suite
        working-directory: timesheet_platform
        env:
          DJANGO_DEBUG: "true"
          DJANGO_SECRET_KEY: "ci-test-secret"
        run: python manage.py test --verbosity 2
